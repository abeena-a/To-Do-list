<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container border border-black mt-5 p-3 mb-2 bg-body-secondary">

        <h1 class="text-center">To-Do List</h1>

        <div class="d-flex flex-row p-5 gap-3">
            <input type="text" placeholder="Add your task here" id="inputTask" class="mx-auto p-2 w-50">
            <button type="button" class="btn btn-outline-success rounded-4 w-25" id="btnAdd">+ Add</button>
        </div>


        <ul id="taskList" class="list-group mt-3 text-center">
            <li id="emptyMessage" class="list-group-item text-muted fw-light fst-italic">No tasks added yet</li>
        </ul>
    </div>






    <script src="index.js"></script>
</body>

</html>
